name: live-smoke

# Manually-triggered smoke test: fetches the LIVE site from a GitHub runner
# (which has open internet) and reports status. Used to verify the production
# deploy renders instead of throwing Internal Server Error.
on:
  workflow_dispatch:
    inputs:
      base:
        description: "Base URL to probe"
        required: false
        default: "https://aurahomes.cz"
  # Also runs on push that touches this file, so the probe can be triggered
  # without workflow_dispatch permissions.
  push:
    paths:
      - ".github/workflows/live-smoke.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe live site (follow redirects, report final status)
        run: |
          set +e
          BASE="${{ github.event.inputs.base }}"
          [ -z "$BASE" ] && BASE="https://aurahomes.cz"
          probe () {
            local path="$1"; local extra="$2"
            echo "===================================================="
            echo "### $path"
            echo "--- response headers (NO follow) ---"
            curl -sS $extra -D - -o /dev/null --max-time 30 "$BASE$path" 2>&1 | tr -d '\r' | sed -n '1,15p'
            echo "--- following redirects ---"
            local out; out=$(curl -sSL $extra -o /tmp/body.html -w "FINAL_STATUS=%{http_code} FINAL_URL=%{url_effective} REDIRECTS=%{num_redirects}" --max-time 40 "$BASE$path" 2>&1)
            echo "$out"
            echo "TITLE: $(grep -o '<title>[^<]*</title>' /tmp/body.html | head -1)"
            echo "--- first 300 chars of final body ---"
            head -c 300 /tmp/body.html; echo
          }
          # Try a few times in case the deploy is still settling.
          for i in 1 2 3 4 5; do
            fc=$(curl -sSL -o /dev/null -w "%{http_code}" --max-time 40 "$BASE/")
            echo "settle attempt $i: final GET / -> $fc"
            [ "$fc" = "200" ] && break
            sleep 12
          done
          probe "/" ""
          probe "/prihlaseni" ""
          # full login-bypass flow end-to-end (follow redirects, keep cookies)
          curl -sSL -c /tmp/jar.txt -o /dev/null -X POST "$BASE/auth/dev-bypass"
          echo "==== /prehled with bypass cookie ===="
          dash=$(curl -sSL -b /tmp/jar.txt -o /tmp/dash.html -w "%{http_code}" --max-time 40 "$BASE/prehled")
          echo "DASHBOARD_BYPASS_FINAL_STATUS: $dash"
          if grep -q "Vítejte zpět" /tmp/dash.html; then echo "DASHBOARD_GREETING: present"; else echo "DASHBOARD_GREETING: absent"; fi
          if grep -q "Přeskočit přihlášení" /tmp/dash.html; then echo "BYPASS_BUTTON_ON_DASH: present"; fi
          {
            echo "## aurahomes.cz live probe"
            echo "- landing final: \`$fc\`"
            echo "- dashboard (bypass) final: \`$dash\`"
          } >> "$GITHUB_STEP_SUMMARY"
