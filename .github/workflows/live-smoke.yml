name: live-smoke

# Manually-triggered smoke test: fetches the LIVE site from a GitHub runner
# (which has open internet) and reports status. Used to verify the production
# deploy renders instead of throwing Internal Server Error.
on:
  workflow_dispatch:
    inputs:
      base:
        description: "Base URL to probe"
        required: false
        default: "https://aurahomes.cz"
  # Also runs on push that touches this file, so the probe can be triggered
  # without workflow_dispatch permissions.
  push:
    paths:
      - ".github/workflows/live-smoke.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Locate the homepassport deployment + probe it
        run: |
          set +e
          # Candidate hosts: the custom domain + likely Vercel URLs for this repo.
          HOSTS="
          https://www.aurahomes.cz
          https://homepassport.vercel.app
          https://homepassport-bartolomejarbey.vercel.app
          https://homepassport-bartolomejarbeys-projects.vercel.app
          https://homepassport-git-main-bartolomejarbeys-projects.vercel.app
          "
          for BASE in $HOSTS; do
            echo "===================================================="
            echo "### HOST: $BASE"
            land=$(curl -sSL -o /tmp/home.html -w "%{http_code}" --max-time 30 "$BASE/" 2>&1)
            echo "GET /            -> final $land   url=$(curl -sSL -o /dev/null -w '%{url_effective}' --max-time 30 "$BASE/")"
            echo "TITLE: $(grep -o '<title>[^<]*</title>' /tmp/home.html | head -1)"
            login=$(curl -sSL -o /tmp/login.html -w "%{http_code}" --max-time 30 "$BASE/prihlaseni" 2>&1)
            echo "GET /prihlaseni  -> final $login"
            if grep -q "Home Passport" /tmp/home.html /tmp/login.html 2>/dev/null; then echo "IS_HOMEPASSPORT: yes (found 'Home Passport')"; else echo "IS_HOMEPASSPORT: no"; fi
            if grep -q "Přeskočit přihlášení" /tmp/login.html; then echo "BYPASS_BUTTON: present"; fi
          done
          echo "==== summary in step summary ===="
          echo "See logs above for per-host status." >> "$GITHUB_STEP_SUMMARY"
